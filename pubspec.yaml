name: plant_disease_app
description: "AgroVision - AI Powered Plant Disease Detection"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # --- Existing ---
  image_picker: ^1.0.7
  cupertino_icons: ^1.0.8

  # --- Charts ---
  fl_chart: ^0.69.0

  # --- Local Storage ---
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # --- Firebase Auth (NOW ACTIVE) ---
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # --- Session ---
  shared_preferences: ^2.3.2
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_logo.png"